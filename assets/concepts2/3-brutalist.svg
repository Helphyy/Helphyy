<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Mahel Brossier, helphy, infrastructure devops cybersecurite">
  <title>HELPHY / Mahel Brossier</title>

  <style>
    /* Bascule de couleur unique et tres lente sur les aplats d'accent */
    .accent { fill: #FF4A00; animation: bascule 16s steps(1, end) infinite; }
    @keyframes bascule {
      0%   { fill: #FF4A00; }
      50%  { fill: #E10600; }
      100% { fill: #FF4A00; }
    }
    @media (prefers-reduced-motion: reduce) {
      .accent { animation: none; fill: #FF4A00; }
    }

    /* Typographies : uniquement des familles systeme generiques */
    .huge {
      font-family: Helvetica, Arial, sans-serif;
      font-weight: 900;
      font-size: 300px;
      letter-spacing: -8px;
    }
    .mono {
      font-family: "Courier New", Courier, monospace;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2.5px;
    }
    .mono-s {
      font-family: "Courier New", Courier, monospace;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 3px;
    }
  </style>

  <defs>
    <!-- Zone de decoupe : tout ce qui entre dans le bloc de droite s'inverse -->
    <clipPath id="blocDroite">
      <rect x="880" y="0" width="320" height="300"/>
    </clipPath>
    <!-- Zone de decoupe : bande laterale gauche -->
    <clipPath id="blocGauche">
      <rect x="0" y="0" width="72" height="300"/>
    </clipPath>
  </defs>

  <!-- Fond noir plein -->
  <rect width="1200" height="300" fill="#0A0A0A"/>

  <!-- Grille apparente et assumee -->
  <g stroke="#FFFFFF" stroke-opacity="0.13" stroke-width="1" shape-rendering="crispEdges">
    <line x1="192" y1="0" x2="192" y2="300"/>
    <line x1="312" y1="0" x2="312" y2="300"/>
    <line x1="432" y1="0" x2="432" y2="300"/>
    <line x1="552" y1="0" x2="552" y2="300"/>
    <line x1="672" y1="0" x2="672" y2="300"/>
    <line x1="792" y1="0" x2="792" y2="300"/>
    <line x1="1040" y1="0" x2="1040" y2="300" stroke="#0A0A0A" stroke-opacity="0.35"/>
    <line x1="0" y1="56" x2="1200" y2="56"/>
    <line x1="0" y1="244" x2="1200" y2="244"/>
  </g>

  <!-- Aplat d'accent : bloc rectangulaire plein bord a bord a droite -->
  <rect class="accent" x="880" y="0" width="320" height="300"/>

  <!-- Nom en enorme, deborde volontairement a droite du cadre -->
  <text class="huge" x="92" y="248" fill="#FFFFFF">HELPHY</text>
  <!-- Meme mot redessine en noir, decoupe sur l'aplat : inversion nette -->
  <g clip-path="url(#blocDroite)">
    <text class="huge" x="92" y="248" fill="#0A0A0A">HELPHY</text>
  </g>

  <!-- Bande laterale blanche avec texte pivote a 90 degres -->
  <rect x="0" y="0" width="72" height="300" fill="#FFFFFF"/>
  <text class="mono" x="0" y="0" fill="#0A0A0A" text-anchor="middle"
        transform="translate(36,150) rotate(-90)">GREEN IT SOLUTIONS</text>

  <!-- Carre d'accent dans la bande, repere graphique -->
  <rect class="accent" x="22" y="18" width="28" height="28"/>
  <rect class="accent" x="22" y="254" width="28" height="28"/>

  <!-- Numerotation et textes en petit dans les angles -->
  <text class="mono-s" x="96" y="34" fill="#FFFFFF">01 INFRA</text>
  <text class="mono-s" x="230" y="34" fill="#FFFFFF" opacity="0.55">02 DEVOPS</text>
  <text class="mono-s" x="378" y="34" fill="#FFFFFF" opacity="0.55">03 CYBER</text>

  <text class="mono-s" x="860" y="34" fill="#FFFFFF" text-anchor="end">PROXMOX VE / CEPH / DOCKER / ANSIBLE</text>
  <text class="mono-s" x="1176" y="34" fill="#0A0A0A" text-anchor="end">@HELPHYY</text>

  <text class="mono-s" x="96" y="278" fill="#FFFFFF">MAHEL BROSSIER</text>
  <text class="mono-s" x="860" y="278" fill="#FFFFFF" text-anchor="end">DEBIAN / PYTHON / BASH / C</text>
  <text class="mono-s" x="1176" y="278" fill="#0A0A0A" text-anchor="end">N.03</text>

  <!-- Filet blanc de fermeture, cale sur la bande laterale -->
  <rect x="0" y="292" width="880" height="8" fill="#FFFFFF"/>
  <rect x="0" y="0" width="880" height="8" fill="#FFFFFF"/>
</svg>
