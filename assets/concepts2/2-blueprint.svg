<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Mahel Brossier, ingenieur infrastructure, devops et cybersecurite">
  <title>Mahel Brossier / helphy - Infrastructure, DevOps, Cybersecurite</title>
  <style>
    /* palette de plan technique, bleu de plan */
    .bg       { fill: #0d2a4a; }
    .grid-s   { stroke: #ffffff; stroke-opacity: .045; stroke-width: .5; }
    .grid-l   { stroke: #ffffff; stroke-opacity: .085; stroke-width: .6; }
    .frame    { fill: none; stroke: #9fc3e8; stroke-opacity: .55; stroke-width: 1; }
    .frame-in { fill: none; stroke: #9fc3e8; stroke-opacity: .28; stroke-width: .6; }

    /* dalle technique */
    .slab-top { fill: #123457; stroke: #7fa8d4; stroke-opacity: .5; stroke-width: .7; }
    .slab-l   { fill: #0f2c4c; stroke: #7fa8d4; stroke-opacity: .4; stroke-width: .7; }
    .slab-r   { fill: #0c2643; stroke: #7fa8d4; stroke-opacity: .4; stroke-width: .7; }

    /* volumes des baies */
    .face-top { fill: #1c4a7f; stroke: #d6e6f8; stroke-opacity: .9; stroke-width: .9; }
    .face-l   { fill: #123659; stroke: #d6e6f8; stroke-opacity: .9; stroke-width: .9; }
    .face-r   { fill: #0a2543; stroke: #d6e6f8; stroke-opacity: .9; stroke-width: .9; }
    .u-line   { stroke: #9fc3e8; stroke-opacity: .4; stroke-width: .5; }
    .hatch    { stroke: #9fc3e8; stroke-opacity: .2; stroke-width: .5; }

    /* cotation */
    .dim      { stroke: #a8cdf0; stroke-opacity: .75; stroke-width: .7; }
    .ext      { stroke: #a8cdf0; stroke-opacity: .35; stroke-width: .5; }
    .arrow    { fill: #a8cdf0; fill-opacity: .8; }
    .lead     { fill: none; stroke: #a8cdf0; stroke-opacity: .45; stroke-width: .6; }
    .dot      { fill: none; stroke: #cfe2f6; stroke-opacity: .8; stroke-width: .8; }

    text { font-family: ui-monospace, "DejaVu Sans Mono", "Liberation Mono", Menlo, Consolas, monospace; }
    .dim-t   { fill: #a8cdf0; fill-opacity: .85; font-size: 8px; letter-spacing: 1px; text-anchor: middle; }
    .lead-t  { fill: #e6f0fb; font-size: 9.5px; letter-spacing: 1.3px; }
    .lead-s  { fill: #8fb4da; font-size: 8px; letter-spacing: .9px; }

    .eyebrow { fill: #7fa8d4; font-size: 9px; letter-spacing: 3.2px; }
    .name    { fill: #f2f7fd; font-size: 34px; letter-spacing: 2.6px; font-weight: 700; }
    .handle  { fill: #a8cdf0; font-size: 11px; letter-spacing: 2.2px; }
    .role    { fill: #cfe2f6; font-size: 10px; letter-spacing: 2.4px; }
    .role-n  { fill: #6f9bc9; font-size: 8px; letter-spacing: 1.4px; }
    .stack-k { fill: #6f9bc9; font-size: 8px; letter-spacing: 1.6px; }
    .stack-v { fill: #cfe2f6; font-size: 9px; letter-spacing: 1.4px; }

    .tb-k    { fill: #6f9bc9; font-size: 7px; letter-spacing: 1.5px; }
    .tb-v    { fill: #e6f0fb; font-size: 9px; letter-spacing: 1.1px; }
    .tb-vb   { fill: #f2f7fd; font-size: 12px; letter-spacing: 1.8px; font-weight: 700; }

    /* animation unique, tracage lent d une ligne d axe */
    .draw {
      stroke-dasharray: 400; stroke-dashoffset: 400;
      animation: trace 5s cubic-bezier(.35,0,.15,1) .4s forwards;
    }
    @keyframes trace { to { stroke-dashoffset: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .draw { animation: none; stroke-dasharray: none; stroke-dashoffset: 0; }
    }
  </style>

  <defs>
    <pattern id="gsm" width="20" height="20" patternUnits="userSpaceOnUse">
      <path class="grid-s" d="M20 0 H0 V20" fill="none"/>
    </pattern>
    <pattern id="glg" width="100" height="100" patternUnits="userSpaceOnUse">
      <path class="grid-l" d="M100 0 H0 V100" fill="none"/>
    </pattern>
    <clipPath id="clipall"><rect x="0" y="0" width="1200" height="300"/></clipPath>
  </defs>

  <g clip-path="url(#clipall)">
  <rect class="bg" x="0" y="0" width="1200" height="300"/>
  <rect x="0" y="0" width="1200" height="300" fill="url(#gsm)"/>
  <rect x="0" y="0" width="1200" height="300" fill="url(#glg)"/>

