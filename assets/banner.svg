<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280"
     role="img" aria-label="helphy - infrastructure, devops, cybersecurity">
  <title>helphy // infrastructure · devops · cybersecurity</title>

  <defs>
    <style>
      .mono { font-family: "Space Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }

      .bg      { fill: #000000; }
      .panel   { fill: #07090d; }
      .hair    { stroke: #161b26; }
      .hair2   { stroke: #232b3d; }
      .steel   { fill: #6c7a99; }
      .steel-d { fill: #3a4458; }
      .steel-l { fill: #aab6cf; }
      .ice     { fill: #cfe2ff; }
      .violet  { fill: #8b6cff; }

      /* Frappe du sous-titre : 41 caracteres, un pas par caractere. */
      .typer { transform-origin: 60px 0; animation: type 9s steps(41) infinite; }
      @keyframes type {
        0%       { transform: scaleX(0); }
        42%, 94% { transform: scaleX(1); }
        100%     { transform: scaleX(0); }
      }

      .caret-run { animation: caretRun 9s steps(41) infinite; }
      @keyframes caretRun {
        0%       { transform: translateX(0); }
        42%, 94% { transform: translateX(428px); }
        100%     { transform: translateX(0); }
      }

      .caret { animation: caret 1.1s steps(1) infinite; }
      @keyframes caret { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }

      .dot { animation: dot 3.4s ease-in-out infinite; }
      @keyframes dot { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        .typer, .caret-run, .caret, .dot { animation: none; }
        .typer { transform: scaleX(1); }
        .caret-run { transform: translateX(428px); }
      }
    </style>

    <mask id="typeMask">
      <rect class="typer" x="0" y="0" width="1200" height="280" fill="#ffffff"/>
    </mask>
  </defs>

  <rect class="bg" width="1200" height="280"/>
  <rect class="panel" x="1" y="1" width="1198" height="278"/>
  <rect class="hair" x="0.5" y="0.5" width="1199" height="279" fill="none" stroke-width="1"/>

  <!-- Equerres d'angle, tres discretes -->
  <g class="hair2" fill="none" stroke-width="1">
    <path d="M24 44 V24 H44"/>
    <path d="M1176 44 V24 H1156"/>
    <path d="M24 236 V256 H44"/>
    <path d="M1176 236 V256 H1156"/>
  </g>

  <!-- Invite de commande -->
  <text class="mono" x="60" y="66" font-size="15" letter-spacing="1">
    <tspan class="violet">helphy</tspan><tspan class="steel-d">@</tspan><tspan class="steel">greenit</tspan><tspan class="steel-d">:~$</tspan><tspan class="steel-l"> whoami</tspan>
  </text>

  <!-- ASCII art -->
  <g class="mono ice" font-size="17" letter-spacing="0" xml:space="preserve">
    <text x="60" y="110"> _          _        _          </text>
    <text x="60" y="130">| |_   ___ | | _ __ | |_   _  _ </text>
    <text x="60" y="150">| ' \ / -_)| || '_ \| ' \ | || |</text>
    <text x="60" y="170">|_||_|\___||_|| .__/|_||_| \_, |</text>
    <text x="60" y="190" class="steel-d">              |_|          |__/ </text>
  </g>

  <!-- Filet de separation -->
  <line class="hair2" x1="60" y1="212" x2="1140" y2="212" stroke-width="1"/>

  <!-- Sous-titre frappe -->
  <g mask="url(#typeMask)">
    <text class="mono" x="60" y="243" font-size="15" letter-spacing="1.4">
      <tspan class="violet">&gt;</tspan><tspan class="steel-l"> infrastructure · devops · cybersecurity</tspan>
    </text>
  </g>
  <g class="caret-run">
    <rect class="caret" x="60" y="230" width="8" height="16" fill="#8b6cff" opacity=".85"/>
  </g>

  <!-- Meta, aligne a droite -->
  <g class="mono" font-size="13" letter-spacing="1.2">
    <text class="steel-d" x="915" y="116" text-anchor="end">org</text>
    <text class="steel"   x="928" y="116">green it solutions</text>
    <text class="steel-d" x="915" y="140" text-anchor="end">stack</text>
    <text class="steel"   x="928" y="140">proxmox · ceph · docker</text>
    <text class="steel-d" x="915" y="164" text-anchor="end">lang</text>
    <text class="steel"   x="928" y="164">python · bash · c</text>
  </g>

  <!-- Etat -->
  <g>
    <circle class="dot" cx="998" cy="238" r="3.5" fill="#8b6cff"/>
    <text class="mono steel-d" x="1140" y="243" text-anchor="end" font-size="13" letter-spacing="1.4">status: online</text>
  </g>
</svg>
