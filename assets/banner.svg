<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img"
     aria-label="HELPHY - Infrastructure, DevOps, Cybersecurite">
  <title>HELPHY // Infrastructure · DevOps · Cybersécurité</title>

  <defs>
    <!-- Palette reprise de l'avatar : noir, magenta, cyan lumineux, violets profonds -->
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF3EA5"/>
      <stop offset="28%"  stop-color="#C061D8"/>
      <stop offset="52%"  stop-color="#8FD8F0"/>
      <stop offset="74%"  stop-color="#78F0F0"/>
      <stop offset="100%" stop-color="#A8F0F0"/>
    </linearGradient>

    <!-- Bande de lumiere horizontale : effet metal poli -->
    <linearGradient id="polish" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity=".85"/>
      <stop offset="38%"  stop-color="#FFFFFF" stop-opacity=".05"/>
      <stop offset="47%"  stop-color="#FFFFFF" stop-opacity=".55"/>
      <stop offset="56%"  stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity=".18"/>
    </linearGradient>

    <linearGradient id="halo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#FF3EA5" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#FF3EA5" stop-opacity=".55"/>
      <stop offset="70%"  stop-color="#78F0F0" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#78F0F0" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#301848" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#05050A" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <style>
      .m { font-family: "DejaVu Sans Mono", "Liberation Mono", Consolas, "Courier New", monospace; }
      .s { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

      /* Le contenu est visible par defaut : GitHub rend ce SVG dans une balise
         img, ou les navigateurs figent l'horloge des animations CSS. Rien
         d'informatif ne doit dependre du deroulement d'une animation. */
      .flick { animation: flick 6s ease-in-out infinite; }
      @keyframes flick { 0%, 100% { opacity: .55; } 50% { opacity: .9; } }

      @media (prefers-reduced-motion: reduce) { .flick { animation: none; } }
    </style>
  </defs>

  <rect width="1200" height="300" fill="#05050A"/>
  <ellipse cx="600" cy="150" rx="520" ry="150" fill="url(#glow)"/>

  <!-- Traits verticaux facon glitch de donnees, repris de l'avatar -->
  <g stroke-width="1" class="flick">
    <g stroke="#78F0F0" opacity=".30">
      <path d="M132 44 V96"/>   <path d="M186 210 V262"/> <path d="M262 32 V72"/>
      <path d="M948 226 V270"/> <path d="M1016 40 V88"/>  <path d="M1074 196 V256"/>
    </g>
    <g stroke="#FF3EA5" opacity=".30">
      <path d="M96 150 V206"/>  <path d="M216 118 V164"/> <path d="M304 224 V268"/>
      <path d="M898 46 V94"/>   <path d="M1120 120 V172"/>
    </g>
  </g>

  <!-- Halo diffus sous le titre -->
  <ellipse cx="600" cy="142" rx="392" ry="40" fill="url(#halo)" filter="url(#soft)" opacity=".42"/>

  <!-- Titre chrome : degrade magenta vers cyan, puis voile de lumiere -->
  <g text-anchor="middle">
    <text class="s" x="600" y="168" font-size="92" font-weight="700" letter-spacing="16"
          fill="url(#chrome)">HELPHY</text>
    <text class="s" x="600" y="168" font-size="92" font-weight="700" letter-spacing="16"
          fill="url(#polish)">HELPHY</text>
  </g>

  <!-- Filets d'encadrement -->
  <g stroke="#78F0F0" opacity=".35">
    <path d="M140 196 H1060" stroke-width="1"/>
  </g>
  <rect x="140" y="195" width="150" height="2" fill="#FF3EA5" opacity=".8"/>

  <!-- Sous-titre -->
  <text class="m" x="600" y="230" text-anchor="middle" font-size="15" letter-spacing="6.5" fill="#A8F0F0">
    INFRASTRUCTURE · DEVOPS · CYBERSÉCURITÉ
  </text>

  <!-- Mentions d'angle -->
  <text class="m" x="140" y="266" font-size="12" letter-spacing="3" fill="#5A6A9A">MAHEL BROSSIER</text>
  <text class="m" x="1060" y="266" text-anchor="end" font-size="12" letter-spacing="3" fill="#5A6A9A">GREEN IT SOLUTIONS</text>

  <!-- Equerres -->
  <g stroke="#FF3EA5" fill="none" stroke-width="2" opacity=".7">
    <path d="M32 62 V32 H62"/>
    <path d="M1168 62 V32 H1138"/>
  </g>
  <g stroke="#78F0F0" fill="none" stroke-width="2" opacity=".7">
    <path d="M32 238 V268 H62"/>
    <path d="M1168 238 V268 H1138"/>
  </g>
</svg>
