<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340"
     role="img" aria-label="Helphy - Mahel Brossier - Offensive Security and Infrastructure">
  <title>Helphy // Offensive Security &amp; Infrastructure</title>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#070310"/>
      <stop offset="52%"  stop-color="#1a0b38"/>
      <stop offset="62%"  stop-color="#2b0f42"/>
      <stop offset="100%" stop-color="#05060d"/>
    </linearGradient>

    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe06a"/>
      <stop offset="40%"  stop-color="#ff5fa2"/>
      <stop offset="100%" stop-color="#7b2fff"/>
    </linearGradient>

    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#8ff6ff"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>

    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#000000"/>
      <stop offset="30%" stop-color="#ffffff"/>
    </linearGradient>

    <mask id="gridMask">
      <rect x="0" y="200" width="1200" height="140" fill="url(#fade)"/>
    </mask>

    <clipPath id="sunClip">
      <circle cx="600" cy="196" r="86"/>
    </clipPath>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="4" height="2" fill="#000000" opacity="0.28"/>
    </pattern>

    <mask id="typeMask">
      <rect class="typer" x="0" y="0" width="1200" height="340" fill="#ffffff"/>
    </mask>

    <style>
      .mono { font-family: "SFMono-Regular", "JetBrains Mono", Consolas, "Liberation Mono", Menlo, monospace; }

      /* Grille en perspective : le facteur d'echelle egale la raison de la
         suite geometrique des lignes, donc la boucle est parfaitement continue. */
      .grid-h { animation: roll 3.6s linear infinite; }
      @keyframes roll { from { transform: scaleY(1); } to { transform: scaleY(1.4); } }

      .flicker { animation: flicker 5s ease-in-out infinite; }
      @keyframes flicker {
        0%, 88%, 100% { opacity: 1; }
        90%           { opacity: .55; }
        92%           { opacity: 1; }
        94%           { opacity: .7; }
      }

      .gl-c { animation: glitchC 4.5s steps(1) infinite; }
      .gl-m { animation: glitchM 4.5s steps(1) infinite; }
      @keyframes glitchC {
        0%, 84%, 100% { transform: translate(0,0);    opacity: .85; }
        86%           { transform: translate(-6px,2px); opacity: 1; }
        89%           { transform: translate(4px,-3px); opacity: 1; }
        92%           { transform: translate(-3px,1px); opacity: 1; }
      }
      @keyframes glitchM {
        0%, 84%, 100% { transform: translate(0,0);    opacity: .85; }
        86%           { transform: translate(6px,-2px); opacity: 1; }
        89%           { transform: translate(-5px,3px); opacity: 1; }
        92%           { transform: translate(3px,-1px); opacity: 1; }
      }

      .slice { animation: slice 4.5s steps(1) infinite; }
      @keyframes slice {
        0%, 85%, 100% { opacity: 0; }
        87%           { opacity: 1; transform: translateX(-14px); }
        90%           { opacity: 1; transform: translateX(10px); }
      }

      /* Effet machine a ecrire : 38 caracteres reveles un par un. */
      .typer { transform-origin: 118px 0; animation: type 7s steps(38) infinite; }
      @keyframes type {
        0%       { transform: scaleX(0); }
        55%, 92% { transform: scaleX(1); }
        100%     { transform: scaleX(0); }
      }

      .caret { animation: caret 1s steps(1) infinite; }
      @keyframes caret { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

      /* Le curseur suit la frappe : meme duree et meme nombre de pas. */
      .caret-run { animation: caretRun 7s steps(38) infinite; }
      @keyframes caretRun {
        0%       { transform: translateX(0); }
        55%, 92% { transform: translateX(594px); }
        100%     { transform: translateX(0); }
      }

      .sweep { animation: sweep 6s linear infinite; }
      @keyframes sweep {
        0%   { transform: translateY(-20px); opacity: 0; }
        8%   { opacity: .55; }
        92%  { opacity: .55; }
        100% { transform: translateY(360px); opacity: 0; }
      }

      .drift { animation: drift 1.2s linear infinite; }
      @keyframes drift { from { transform: translateY(0); } to { transform: translateY(4px); } }

      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }

      @media (prefers-reduced-motion: reduce) {
        .grid-h, .flicker, .gl-c, .gl-m, .slice, .typer, .caret, .caret-run,
        .sweep, .drift, .pulse {
          animation: none;
        }
        .typer { transform: scaleX(1); }
        .caret-run { transform: translateX(594px); }
        .slice { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="1200" height="340" fill="url(#sky)"/>

  <!-- Soleil synthwave strie -->
  <g filter="url(#glow)" opacity=".92">
    <circle cx="600" cy="196" r="86" fill="url(#sun)"/>
    <g clip-path="url(#sunClip)" fill="#1a0b38">
      <rect x="514" y="168" width="172" height="5"/>
      <rect x="514" y="182" width="172" height="7"/>
      <rect x="514" y="198" width="172" height="9"/>
      <rect x="514" y="216" width="172" height="12"/>
      <rect x="514" y="238" width="172" height="16"/>
      <rect x="514" y="264" width="172" height="22"/>
    </g>
  </g>

  <!-- Etoiles -->
  <g fill="#ffffff">
    <circle cx="120" cy="46"  r="1.4" opacity=".7"  class="pulse"/>
    <circle cx="284" cy="82"  r="1"   opacity=".5"/>
    <circle cx="392" cy="38"  r="1.6" opacity=".8"  class="pulse"/>
    <circle cx="836" cy="58"  r="1.2" opacity=".6"/>
    <circle cx="964" cy="96"  r="1.5" opacity=".75" class="pulse"/>
    <circle cx="1094" cy="44" r="1"   opacity=".5"/>
    <circle cx="710" cy="30"  r="1.1" opacity=".55"/>
  </g>

  <!-- Sol : grille en perspective -->
  <g mask="url(#gridMask)">
    <rect x="0" y="200" width="1200" height="140" fill="#0a0420"/>
    <g stroke="#00f0ff" stroke-width="1" opacity=".55">
      <!-- Rayons convergents vers le point de fuite (600, 200) -->
      <g>
        <path d="M600 200 L-1400 340"/><path d="M600 200 L-1000 340"/>
        <path d="M600 200 L-640 340"/> <path d="M600 200 L-340 340"/>
        <path d="M600 200 L-90 340"/>  <path d="M600 200 L120 340"/>
        <path d="M600 200 L300 340"/>  <path d="M600 200 L450 340"/>
        <path d="M600 200 L600 340"/>  <path d="M600 200 L750 340"/>
        <path d="M600 200 L900 340"/>  <path d="M600 200 L1080 340"/>
        <path d="M600 200 L1290 340"/> <path d="M600 200 L1540 340"/>
        <path d="M600 200 L1840 340"/> <path d="M600 200 L2200 340"/>
        <path d="M600 200 L2600 340"/>
      </g>
      <!-- Lignes d'horizon : offsets en suite geometrique de raison 1.4 -->
      <g transform="translate(0 200)">
        <g class="grid-h">
          <path d="M0 2 H1200"/>      <path d="M0 2.8 H1200"/>
          <path d="M0 3.9 H1200"/>    <path d="M0 5.5 H1200"/>
          <path d="M0 7.7 H1200"/>    <path d="M0 10.8 H1200"/>
          <path d="M0 15.1 H1200"/>   <path d="M0 21.1 H1200"/>
          <path d="M0 29.5 H1200"/>   <path d="M0 41.3 H1200"/>
          <path d="M0 57.9 H1200"/>   <path d="M0 81 H1200"/>
          <path d="M0 113.4 H1200"/>  <path d="M0 158.8 H1200"/>
        </g>
      </g>
    </g>
    <!-- Ligne d'horizon nette -->
    <rect x="0" y="199" width="1200" height="2" fill="#00f0ff" opacity=".9" filter="url(#softGlow)"/>
  </g>

  <!-- Titre glitche -->
  <g class="flicker">
    <text class="mono gl-m" x="600" y="150" text-anchor="middle" font-size="92" font-weight="700"
          letter-spacing="14" fill="#ff2d95">HELPHY</text>
    <text class="mono gl-c" x="600" y="150" text-anchor="middle" font-size="92" font-weight="700"
          letter-spacing="14" fill="#00f0ff">HELPHY</text>
    <text class="mono" x="600" y="150" text-anchor="middle" font-size="92" font-weight="700"
          letter-spacing="14" fill="url(#title)" filter="url(#glow)">HELPHY</text>
  </g>

  <!-- Bandes de glitch -->
  <g class="slice">
    <rect x="380" y="104" width="440" height="9" fill="#00f0ff" opacity=".65"/>
    <rect x="420" y="132" width="360" height="6" fill="#ff2d95" opacity=".6"/>
  </g>

  <!-- Bandeau console : garde le sous-titre lisible par-dessus le soleil -->
  <g>
    <rect x="104" y="172" width="638" height="34" rx="3" fill="#05060d" opacity=".78"/>
    <rect x="104" y="172" width="3" height="34" fill="#ff2d95" opacity=".9"/>
  </g>

  <!-- Sous-titre machine a ecrire -->
  <g mask="url(#typeMask)">
    <text class="mono" x="118" y="196" font-size="21" letter-spacing="2.5" fill="#7ef9d8">
      <tspan fill="#ff2d95">&gt;</tspan> offensive security // infrastructure
    </text>
  </g>
  <g class="caret-run">
    <rect class="caret" x="118" y="180" width="11" height="20" fill="#7ef9d8" opacity=".9"/>
  </g>

  <!-- Equerres d'angle -->
  <g stroke="#00f0ff" stroke-width="2" fill="none" opacity=".85" filter="url(#softGlow)">
    <path d="M24 58 V24 H58"/>
    <path d="M1176 58 V24 H1142"/>
    <path d="M24 282 V316 H58"/>
    <path d="M1176 282 V316 H1142"/>
  </g>

  <!-- Etiquettes -->
  <text class="mono" x="30" y="332" font-size="12" letter-spacing="3" fill="#00f0ff" opacity=".55">
    GREEN IT SOLUTIONS
  </text>
  <text class="mono" x="1170" y="332" text-anchor="end" font-size="12" letter-spacing="3" fill="#ff2d95" opacity=".55">
    PENTEST / NET / SYS
  </text>

  <!-- Balayage CRT -->
  <rect class="sweep" x="0" y="0" width="1200" height="3" fill="#8ff6ff"/>

  <!-- Scanlines -->
  <g class="drift">
    <rect x="0" y="-8" width="1200" height="360" fill="url(#scan)"/>
  </g>

  <!-- Vignette -->
  <rect width="1200" height="340" fill="none" stroke="#00f0ff" stroke-width="1" opacity=".25"/>
</svg>
