<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Ecran de POST BIOS retro presentant Mahel Brossier, helphy, infrastructure DevOps et cybersecurite chez Green IT Solutions">
  <title>Mahel Brossier (helphy) - POST BIOS</title>

  <style>
    /* Palette IBM : fond bleu profond, texte gris clair, accents ambre */
    .mono { font-family: "DejaVu Sans Mono", "Liberation Mono", "Courier New", monospace; }
    .lbl  { fill: #C8C8D8; }
    .val  { fill: #FFFFFF; }
    .amb  { fill: #FFB000; }
    .dim  { fill: #8A8AB0; }
    .barTxt { fill: #000080; }

    /* IMPORTANT : tout le contenu est visible par defaut.
       GitHub affiche cette banniere via une balise img, et les navigateurs
       brident les animations CSS des SVG charges ainsi : l'horloge se fige
       apres quelques dixiemes de seconde. Toute revelation progressive basee
       sur opacity:0 + animation-delay laisse donc l'ecran vide en pratique.
       Aucune information ne doit dependre du deroulement d'une animation. */
    .seq { opacity: 1; }

    /* Le curseur clignote, mais reste visible si l'animation est figee. */
    .cursor { fill: #FFB000; opacity: 1; animation: blink 1.06s steps(1) infinite; }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      .cursor { animation: none; }
    }
  </style>

  <!-- Fond ecran CRT -->
  <rect width="1200" height="300" fill="#0000AA"/>

  <!-- Cadre a filet double, dessine en rect pour garantir l'alignement -->
  <rect x="10.5" y="10.5" width="1179" height="279" fill="none" stroke="#C8C8D8" stroke-width="1"/>
  <rect x="15.5" y="15.5" width="1169" height="269" fill="none" stroke="#C8C8D8" stroke-width="1"/>

  <!-- Barre de titre en video inverse -->
  <rect x="24" y="24" width="1152" height="26" fill="#C8C8D8"/>
  <text xml:space="preserve" class="mono barTxt" x="36" y="42" font-size="14.5" font-weight="bold">HELPHY BIOS (C) 2026  Green IT Solutions</text>
  <text xml:space="preserve" class="mono barTxt" x="1164" y="42" font-size="14.5" text-anchor="end">v2.6.1  REL 07/19/26</text>

  <!-- Entete de la sequence de detection -->
  <text class="mono dim seq l1" x="36" y="74" font-size="13.5">Detecting system components ...</text>

  <!-- Lignes de detection materielle detournees -->
  <g font-size="15">
    <text class="mono lbl seq l2" x="36" y="100">CPU</text>
    <text class="mono lbl seq l2" x="150" y="100">:</text>
    <text xml:space="preserve" class="mono val seq l2" x="172" y="100">Infrastructure  /  DevOps  /  Cybersécurité</text>
    <text class="mono amb seq s2" x="1164" y="100" text-anchor="end">3 CORES</text>

    <text class="mono lbl seq l3" x="36" y="126">MEMORY</text>
    <text class="mono lbl seq l3" x="150" y="126">:</text>
    <text class="mono val seq l3" x="172" y="126">Proxmox VE, Ceph, Debian</text>
    <text class="mono amb seq s3" x="1164" y="126" text-anchor="end">OK</text>

    <text class="mono lbl seq l4" x="36" y="152">STORAGE</text>
    <text class="mono lbl seq l4" x="150" y="152">:</text>
    <text class="mono val seq l4" x="172" y="152">Docker, Ansible, Bash</text>
    <text class="mono amb seq s4" x="1164" y="152" text-anchor="end">MOUNTED</text>

    <text class="mono lbl seq l5" x="36" y="178">NETWORK</text>
    <text class="mono lbl seq l5" x="150" y="178">:</text>
    <text class="mono val seq l5" x="172" y="178">Python, C, Git</text>
    <text class="mono amb seq s5" x="1164" y="178" text-anchor="end">LINK UP</text>

    <text class="mono lbl seq l6" x="36" y="204">HOST</text>
    <text class="mono lbl seq l6" x="150" y="204">:</text>
    <text class="mono val seq l6" x="172" y="204">Green IT Solutions</text>
    <text class="mono amb seq s6" x="1164" y="204" text-anchor="end">ONLINE</text>

    <text class="mono lbl seq l7" x="36" y="230">USER</text>
    <text class="mono lbl seq l7" x="150" y="230">:</text>
    <text xml:space="preserve" class="mono val seq l7" x="172" y="230">Mahel Brossier  &#171;helphy&#187;  @Helphyy</text>
    <text class="mono amb seq l7" x="1164" y="230" text-anchor="end">AUTHENTICATED</text>
  </g>

  <!-- Filet de separation -->
  <line class="seq l8" x1="36" y1="244" x2="1164" y2="244" stroke="#6E6EC8" stroke-width="1"/>

  <!-- Invite de demarrage et curseur bloc -->
  <text class="mono dim seq l8" x="36" y="266" font-size="13.5">Boot from github.com/Helphyy ...</text>
  <rect class="cursor" x="296" y="255" width="9" height="15"/>

  <!-- Barre d'aide en video inverse, detournee vers les liens -->
  <rect x="678" y="252" width="498" height="24" fill="#C8C8D8"/>
  <text xml:space="preserve" class="mono barTxt" x="690" y="269" font-size="13">F1 GITHUB.COM/HELPHYY   F2 GREENITSOLUTIONS.FR   F12 CONTACT</text>

  <!-- Lignes de balayage CRT, purement decoratives -->
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="#000033" opacity="0.09"/>
    </pattern>
  </defs>
  <rect width="1200" height="300" fill="url(#scan)" pointer-events="none"/>
</svg>
