<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img"
     aria-label="helphy - infrastructure, devops, security">
  <title>helphy@github // infrastructure · devops · security</title>

  <defs>
    <style>
      .m { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, "DejaVu Sans Mono", monospace; }

      .key    { fill: #7aa2f7; }
      .val    { fill: #c0caf5; }
      .dim    { fill: #565f89; }
      .accent { fill: #bb9af7; }

      /* Les trois LED respirent en decalage, comme une baie qui travaille. */
      .led1 { animation: led 4.2s ease-in-out infinite; }
      .led2 { animation: led 4.2s ease-in-out .7s infinite; }
      .led3 { animation: led 4.2s ease-in-out 1.4s infinite; }
      @keyframes led { 0%, 100% { opacity: .22; } 50% { opacity: 1; } }

      .caret { animation: caret 1.15s steps(1) infinite; }
      @keyframes caret { 0%, 55% { opacity: 1; } 56%, 100% { opacity: 0; } }

      @media (prefers-reduced-motion: reduce) {
        .led1, .led2, .led3, .caret { animation: none; opacity: .75; }
      }
    </style>
  </defs>

  <rect width="1200" height="320" fill="#16161e"/>
  <rect x="1" y="1" width="1198" height="318" fill="none" stroke="#292e42" stroke-width="2"/>

  <!-- Logo : baie serveur, trois lames -->
  <g transform="translate(78 76)">
    <rect x="0" y="0"   width="160" height="52" rx="3" fill="#1a1b26" stroke="#414868"/>
    <rect x="0" y="58"  width="160" height="52" rx="3" fill="#1a1b26" stroke="#414868"/>
    <rect x="0" y="116" width="160" height="52" rx="3" fill="#1a1b26" stroke="#414868"/>
    <g fill="#9ece6a">
      <circle class="led1" cx="20" cy="26"  r="4.5"/>
      <circle class="led2" cx="20" cy="84"  r="4.5"/>
      <circle class="led3" cx="20" cy="142" r="4.5"/>
    </g>
    <g fill="#414868">
      <rect x="40" y="19"  width="104" height="4" rx="2"/>
      <rect x="40" y="30"  width="76"  height="4" rx="2"/>
      <rect x="40" y="77"  width="104" height="4" rx="2"/>
      <rect x="40" y="88"  width="62"  height="4" rx="2"/>
      <rect x="40" y="135" width="104" height="4" rx="2"/>
      <rect x="40" y="146" width="88"  height="4" rx="2"/>
    </g>
  </g>

  <!-- En-tete -->
  <g class="m" font-size="16">
    <text x="300" y="70">
      <tspan class="accent">helphy</tspan><tspan class="dim">@</tspan><tspan class="key">github</tspan>
    </text>
  </g>
  <line x1="300" y1="82" x2="1128" y2="82" stroke="#292e42" stroke-width="1"/>

  <!-- Sortie facon neofetch -->
  <g class="m" font-size="15.5">
    <text x="300" y="114"><tspan class="key">os</tspan>      <tspan class="val" x="452">debian · proxmox ve</tspan></text>
    <text x="300" y="142"><tspan class="key">role</tspan>    <tspan class="val" x="452">infrastructure / devops / security</tspan></text>
    <text x="300" y="170"><tspan class="key">org</tspan>     <tspan class="val" x="452">green it solutions</tspan></text>
    <text x="300" y="198"><tspan class="key">stack</tspan>   <tspan class="val" x="452">ceph · docker · ansible · nginx</tspan></text>
    <text x="300" y="226"><tspan class="key">lang</tspan>    <tspan class="val" x="452">python · bash · c · typescript</tspan></text>
    <text x="300" y="254"><tspan class="key">projects</tspan><tspan class="val" x="452">pvecli · claudock · simple-sso</tspan></text>
  </g>

  <!-- Pastilles de couleur, signature neofetch -->
  <g transform="translate(300 274)">
    <rect x="0"   y="0" width="28" height="15" fill="#f7768e"/>
    <rect x="32"  y="0" width="28" height="15" fill="#e0af68"/>
    <rect x="64"  y="0" width="28" height="15" fill="#9ece6a"/>
    <rect x="96"  y="0" width="28" height="15" fill="#7dcfff"/>
    <rect x="128" y="0" width="28" height="15" fill="#7aa2f7"/>
    <rect x="160" y="0" width="28" height="15" fill="#bb9af7"/>
  </g>

  <!-- Invite en attente -->
  <g class="m" font-size="15.5">
    <text x="1128" y="288" text-anchor="end" class="dim">~$</text>
  </g>
  <rect class="caret" x="1136" y="276" width="9" height="16" fill="#c0caf5" opacity=".8"/>
</svg>
